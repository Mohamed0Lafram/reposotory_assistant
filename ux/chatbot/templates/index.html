<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Site Assistant</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --surface-0: #f1efea;
    --surface-1: #f7f6f3;
    --surface-2: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --text-accent: #185fa5;
    --text-success: #3b6d11;
    --bg-accent: #e6f1fb;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --border-accent: #85b7eb;
    --radius: 8px;
    --font-sans: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --surface-0: #1a1a18;
      --surface-1: #242422;
      --surface-2: #2e2e2b;
      --text-primary: #e8e6df;
      --text-secondary: #b4b2a9;
      --text-muted: #888780;
      --text-accent: #85b7eb;
      --text-success: #97c459;
      --bg-accent: #0c447c;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --border-accent: #378add;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--surface-0);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .app {
    width: 100%;
    max-width: 480px;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* ── URL Screen ── */
  #screen-url {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 2rem;
    min-height: 320px;
  }

  .logo {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .url-card { width: 100%; }

  .url-card h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .url-card p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1.25rem;
    line-height: 1.55;
  }

  .url-row { display: flex; gap: 8px; }

  .url-row input {
    flex: 1;
    height: 38px;
    font-size: 14px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 0 12px;
    background: var(--surface-1);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: var(--font-sans);
  }

  .url-row input:focus {
    border-color: var(--border-accent);
    box-shadow: 0 0 0 3px var(--bg-accent);
  }

  .url-row button {
    height: 38px;
    padding: 0 18px;
    font-size: 13px;
    font-weight: 500;
    background: var(--text-primary);
    color: var(--surface-2);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    font-family: var(--font-sans);
  }

  .url-row button:hover { opacity: 0.8; }
  .url-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .analyzing {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .dot-pulse { display: flex; gap: 4px; }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
    40%          { opacity: 1;   transform: scale(1);   }
  }

  /* ── Chat Screen ── */
  #screen-chat { display: none; flex-direction: column; height: 540px; }

  .chat-header {
    background: var(--surface-2);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chat-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg-accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .chat-avatar i { font-size: 17px; color: var(--text-accent); }

  .chat-info { flex: 1; min-width: 0; }
  .chat-info strong { font-size: 13px; font-weight: 500; color: var(--text-primary); display: block; }
  .chat-info span   { font-size: 11px; color: var(--text-success); }

  .chat-url-tag {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface-1);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--font-mono);
    max-width: 140px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .back-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    font-family: var(--font-sans);
    transition: background 0.15s;
  }
  .back-btn:hover { background: var(--surface-1); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--surface-0);
  }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .bubble {
    max-width: 74%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
  }

  .msg.bot .bubble {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: var(--text-primary);
    color: var(--surface-2);
    border-bottom-right-radius: 4px;
  }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg.bot .msg-avatar  { background: var(--bg-accent); }
  .msg.bot .msg-avatar i { font-size: 13px; color: var(--text-accent); }
  .msg.user .msg-avatar  { background: var(--surface-2); border: 0.5px solid var(--border); }
  .msg.user .msg-avatar i { font-size: 13px; color: var(--text-secondary); }

  .typing-bubble {
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    display: flex; align-items: center;
  }

  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }

  .sug {
    font-size: 11px;
    border: 0.5px solid var(--border-accent);
    background: var(--bg-accent);
    color: var(--text-accent);
    border-radius: 12px;
    padding: 4px 11px;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: var(--font-sans);
  }
  .sug:hover { opacity: 0.7; }

  .chat-input-bar {
    border-top: 0.5px solid var(--border);
    padding: 10px 12px;
    display: flex; gap: 8px;
    background: var(--surface-2);
  }

  .chat-input-bar input {
    flex: 1;
    height: 38px;
    font-size: 13px;
    border: 0.5px solid var(--border-strong);
    border-radius: 19px;
    padding: 0 16px;
    background: var(--surface-1);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
    font-family: var(--font-sans);
  }
  .chat-input-bar input:focus { border-color: var(--border-accent); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--text-primary);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.8; }
  .send-btn i { font-size: 16px; color: var(--surface-2); }
</style>
</head>
<body>

<div class="app">

  <!-- URL Entry Screen -->
  <div id="screen-url">
    <div class="logo">Site assistant</div>
    <div class="url-card">
      <h2>Enter a website URL</h2>
      <p>Paste any URL and the assistant will answer questions about that page.</p>
      <div class="url-row">
        <input type="text" id="url-input" placeholder="https://example.com" />
        <button id="analyze-btn">Analyze</button>
      </div>
      <div class="analyzing" id="analyzing-row">
        <div class="dot-pulse">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <span id="analyzing-text">Connecting to page…</span>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="screen-chat">
    <div class="chat-header">
      <div class="chat-avatar"><i class="ti ti-robot" aria-hidden="true"></i></div>
      <div class="chat-info">
        <strong>Site assistant</strong>
        <span>● online</span>
      </div>
      <div class="chat-url-tag" id="active-url-tag">—</div>
      <button class="back-btn" id="back-btn">
        <i class="ti ti-arrow-left" aria-hidden="true"></i> New URL
      </button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Ask something about this page…" />
      <button class="send-btn" id="send-btn" aria-label="Send">
        <i class="ti ti-arrow-up"></i>
      </button>
    </div>
  </div>

</div>

<script>
  const screenUrl    = document.getElementById('screen-url');
  const screenChat   = document.getElementById('screen-chat');
  const urlInput     = document.getElementById('url-input');
  const analyzeBtn   = document.getElementById('analyze-btn');
  const analyzingRow = document.getElementById('analyzing-row');
  const analyzingTxt = document.getElementById('analyzing-text');
  const activeUrlTag = document.getElementById('active-url-tag');
  const messages     = document.getElementById('messages');
  const chatInput    = document.getElementById('chat-input');
  const sendBtn      = document.getElementById('send-btn');
  const backBtn      = document.getElementById('back-btn');

  let currentUrl = '';

  const steps = [
    'Connecting to page…',
    'Scanning content…',
    'Building knowledge base…',
    'Almost ready…'
  ];

  analyzeBtn.addEventListener('click', () => {
    let raw = urlInput.value.trim();
    if (!raw) { urlInput.focus(); return; }
    if (!raw.startsWith('http')) raw = 'https://' + raw;
    currentUrl = raw;
    analyzeBtn.disabled = true;
    analyzingRow.style.display = 'flex';
    analyzingTxt.textContent = steps[0];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      if (i < steps.length) { analyzingTxt.textContent = steps[i]; }
      else { clearInterval(iv); openChat(); }
    }, 650);
  });

  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyzeBtn.click(); });

  function openChat() {
    analyzeBtn.disabled = false;
    analyzingRow.style.display = 'none';
    const domain = currentUrl.replace(/^https?:\/\//, '').split('/')[0];
    activeUrlTag.textContent = domain;
    activeUrlTag.title = currentUrl;
    screenUrl.style.display = 'none';
    screenChat.style.display = 'flex';
    messages.innerHTML = '';
    addMessage('bot', `Hi! I've analyzed <strong>${domain}</strong>. What would you like to know about this page?`);
    addSuggestions(['What is this site about?', 'Who is it for?', 'What can I do here?', 'Is it secure?']);
  }

  backBtn.addEventListener('click', () => {
    screenChat.style.display = 'none';
    screenUrl.style.display  = 'flex';
    urlInput.value = '';
    currentUrl = '';
  });

  function addMessage(role, html) {
    const row = document.createElement('div');
    row.className = 'msg ' + role;
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.setAttribute('aria-hidden', 'true');
    av.innerHTML = role === 'bot' ? '<i class="ti ti-robot"></i>' : '<i class="ti ti-user"></i>';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = html;
    row.appendChild(av);
    row.appendChild(b);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function addSuggestions(list) {
    const div = document.createElement('div');
    div.className = 'suggestions';
    list.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sug';
      btn.textContent = s;
      btn.addEventListener('click', () => { div.remove(); handleUserMsg(s); });
      div.appendChild(btn);
    });
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg bot';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-avatar" aria-hidden="true"><i class="ti ti-robot"></i></div>
      <div class="typing-bubble">
        <div class="dot-pulse">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function handleUserMsg(text) {
    if (!text.trim()) return;
    addMessage('user', text);
    chatInput.value = '';
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text, url: currentUrl })
      });
      const data = await res.json();
      removeTyping();
      addMessage('bot', data.answer || 'Sorry, I could not process that.');
    } catch {
      removeTyping();
      addMessage('bot', 'Something went wrong. Please try again.');
    }
  }

  sendBtn.addEventListener('click', () => handleUserMsg(chatInput.value.trim()));
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleUserMsg(chatInput.value.trim()); });
</script>

</body>
</html>
